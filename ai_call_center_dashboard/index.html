<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Call Center Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <!-- Left: Chat Interface -->
    <section class="chat-panel">
      <div class="chat-header">Patient • AI Assistant</div>
      <div class="chat-body" id="chatBody">
        <!-- Example messages -->
        <div class="message patient">
          <div class="bubble">Hello, I have a headache.</div>
        </div>
        <div class="message ai">
          <div class="bubble">I'm sorry to hear that. How long have you been experiencing it?</div>
        </div>
        <!-- Typing placeholder -->
        <div class="typing-indicator" id="typingIndicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    </section>

    <!-- Right: AI Voice Orb -->
    <section class="orb-panel">
      <div class="orb-container">
        <div class="orb" id="orb"></div>
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
      </div>
    </section>
  </div>

  <!-- Bottom Status Bar -->
  <footer class="status-bar">
    <span class="status-item">🔒 Secure TLS</span>
    <span class="status-item">⚡ Real‑time sync</span>
    <span class="status-item">🤖 AI processing</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
